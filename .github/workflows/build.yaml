name: ImageBuild

on:
  push:
    branches:
      - main
      - dev

env:
  DOCKER_REGISTRY: ghcr.io
  NAME: kartverket/geonorge-kartkatalog-backend
  ENV_SUFFIX: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
  DEPLOY_PATH: ${{ github.ref_name == 'main' && 'env/atkv3-prod/geonorge-kartkatalog/kartkatalog-backend-version' || 'env/atkv3-dev/geonorge-kartkatalog-dev/kartkatalog-backend-version' }}

jobs:
  build_image:
    name: Build image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: read
      id-token: write

    outputs:
      version: ${{ steps.set_output.outputs.version }}
      tags: ${{ steps.meta.outputs.tags }}
      short_tag: ${{ steps.short_tag.outputs.value }}
      commit_message: ${{ steps.get_commit_message.outputs.backend_commit_message }}
      commit_author_name: ${{ steps.get_commit_author.outputs.name }}
      commit_author_email: ${{ steps.get_commit_author.outputs.email }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Extract the latest commit message from the current repo
      - name: Get commit message
        id: get_commit_message
        run: |
          {
            echo 'backend_commit_message<<EOF'
            git log -1 --pretty=%B
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Get commit author
        id: get_commit_author
        run: |
          echo "name=$(git log -1 --pretty=%an)" >> "$GITHUB_OUTPUT"
          echo "email=$(git log -1 --pretty=%ae)" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Compute short tag
        id: short_tag
        run: echo "value=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build docker image and push
        id: build_image
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./Kartverket.Metadatakatalog/Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true

      - name: Summarize image digest and set output
        id: set_output
        run: |
          echo "Tags: ${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Digest: ${{ steps.build_image.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo "version=${{ github.ref_name }}@${{ steps.build_image.outputs.digest }}" >> "$GITHUB_OUTPUT"
          echo "image_url=${{ env.DOCKER_REGISTRY }}/${{ env.NAME }}-${{ env.ENV_SUFFIX }}:${{ steps.meta.outputs.version }}@${{ steps.build_image.outputs.digest }}" >> "$GITHUB_OUTPUT"

  run-pharos:
    name: Run Pharos
    runs-on: ubuntu-latest
    needs: [build_image]
    permissions:
      actions: read
      packages: read
      contents: read
      security-events: write
    steps:
      - name: "Run Pharos"
        uses: kartverket/pharos@v0.6.4
        with:
          image_url: ${{ needs.build_image.outputs.image_url }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build_image, run-pharos]
    name: Deploy
    permissions:
      contents: read
      id-token: write
    # Using always() to ensure the deploy runs on dev even if run-pharos job fails, but only deploy to main if run-pharos is successful
    if: always() && needs.build_image.result == 'success' && needs.run-pharos.result != 'cancelled' && (github.ref_name == 'dev' || needs.run-pharos.result == 'success')
    steps:
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05
        id: octo-sts
        with:
          scope: kartverket/geonorge-apps
          identity: kartkatalog-backend

      - name: Checkout apps repository
        uses: actions/checkout@v6
        with:
          repository: kartverket/geonorge-apps
          ref: main
          token: ${{ steps.octo-sts.outputs.token }}

      - name: Git setup for deploy
        run: |
          git config --global user.email "${{ needs.build_image.outputs.commit_author_email }}"
          git config --global user.name "${{ needs.build_image.outputs.commit_author_name }}"

      - name: Update deployment
        env:
          COMMIT_MESSAGE: ${{ needs.build_image.outputs.commit_message }}
          IMAGE: "${{ env.DOCKER_REGISTRY }}/${{ env.NAME }}-${{ env.ENV_SUFFIX }}:${{ needs.build_image.outputs.short_tag }}"
        run: |
          echo "\"${IMAGE}\"" > "${{ env.DEPLOY_PATH }}"
          git add .
          git commit -m "$COMMIT_MESSAGE"
          git push
